<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://accounts.google.com/gsi/client"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConstructTrack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f2ed;--sur:#fff;--s2:#f0ede8;--s3:#e8e4de;--bdr:#d4cfc7;--b2:#c2bdb4;--txt:#1a1714;--t2:#5a5550;--t3:#8a8580;--acc:#c85a1a;--a2:#e8712a;--abg:#fdf0e8;--grn:#2a7a3a;--gbg:#eaf5ec;--blu:#1a4a8a;--bbg:#eaf0fa;--amb:#8a6200;--amg:#faf5e8;--red:#8a1a1a;--rbg:#faf0f0;--pur:#5a1a8a;--pbg:#f5eafa}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:#1a1714;color:#fff;padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;flex-shrink:0}
.topbar h1{font-family:monospace;font-size:15px;font-weight:500;letter-spacing:.04em}
.logo{width:28px;height:28px;background:var(--acc);display:flex;align-items:center;justify-content:center;border-radius:4px}
.logo svg{width:16px;height:16px;fill:#fff}
.spacer{flex:1}
.psel{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 10px;border-radius:4px;font-size:13px;font-family:inherit;cursor:pointer}
.psel option{color:var(--txt);background:#fff}
.tbtn{background:var(--acc);color:#fff;border:none;padding:6px 14px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.tbtn:hover{background:var(--a2)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.snav{padding:12px 0;flex:1}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;color:var(--t2);cursor:pointer;border-left:3px solid transparent;user-select:none}
.ni:hover{background:var(--s2);color:var(--txt)}
.ni.active{background:var(--abg);color:var(--acc);border-left-color:var(--acc);font-weight:500}
.ni svg{width:16px;height:16px;flex-shrink:0}
.nsec{padding:4px 16px;font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-top:8px}
.sbot{padding:12px;border-top:1px solid var(--bdr)}
.pcm{background:var(--s2);border-radius:6px;padding:10px;font-size:12px}
.pcm-n{font-weight:600;font-size:13px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcm-p{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.pcm-b{height:100%;background:var(--acc);border-radius:2px}
.content{flex:1;overflow:auto;padding:20px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:16px;margin-bottom:16px}
.btn{padding:7px 14px;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit}
.bp{background:var(--acc);color:#fff}.bp:hover{background:var(--a2)}
.bg2{background:transparent;color:var(--t2);border:1px solid var(--bdr)}.bg2:hover{background:var(--s2)}
.bd{background:var(--rbg);color:var(--red);border:1px solid #e8c0c0}
.bv{background:var(--pbg);color:var(--pur);border:1px solid #d8b8f0}.bv:hover{background:#ede0fa}
.bxs{padding:3px 8px;font-size:11px;border-radius:4px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.badge.cmp{background:var(--gbg);color:var(--grn)}.badge.inp{background:var(--abg);color:var(--acc)}
.badge.upc{background:var(--bbg);color:var(--blu)}.badge.del{background:var(--rbg);color:var(--red)}
.badge.act{background:var(--gbg);color:var(--grn)}.badge.pln{background:var(--bbg);color:var(--blu)}
.badge.cls{background:var(--amg);color:var(--amb)}.badge.unk{background:var(--s3);color:var(--t2)}
.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:14px 16px}
.slbl{font-size:11px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.sval{font-size:20px;font-weight:600;font-family:monospace}
.ssub{font-size:11px;color:var(--t3);margin-top:2px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.pt{font-size:18px;font-weight:600}.ps{font-size:13px;color:var(--t3);margin-top:2px}
.pa{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ct{font-size:13px;font-weight:600}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;padding:7px 10px;border:1px solid var(--bdr);border-radius:5px;font-size:13px;font-family:inherit;color:var(--txt);background:var(--sur);outline:none}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--acc)}
.fr textarea{resize:vertical;min-height:60px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mdov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:var(--sur);border-radius:10px;padding:24px;width:560px;max-width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.md-wide{width:800px}
.mdh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mdt{font-size:16px;font-weight:600}
.mdc{background:none;border:none;cursor:pointer;color:var(--t3);font-size:22px;line-height:1}
.mdf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr)}
.mi{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.mi:last-child{border-bottom:none}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dot.complete{background:var(--grn)}.dot.inprog{background:var(--acc);animation:pulse 1.5s infinite}
.dot.upcoming{background:var(--b2)}.dot.delayed{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.gz{overflow-x:auto;position:relative}
.gl{padding:6px 10px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid var(--bdr);background:var(--sur);display:flex;align-items:center;gap:6px}
.gc{border-bottom:1px solid var(--bdr);background:var(--sur);position:relative;height:32px}
.gb{position:absolute;top:6px;height:20px;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;min-width:4px}
.gb.complete{background:var(--grn);opacity:.85}.gb.inprog{background:var(--acc)}
.gb.upcoming{background:var(--blu);opacity:.7}.gb.delayed{background:var(--red)}
.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--bdr);background:var(--s2)}
.st td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.st tr:hover td{background:var(--s2)}.stot td{background:var(--s2)!important;font-weight:600}
.mn{font-family:monospace;font-size:12px}
.sp{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;min-width:60px;margin-top:3px}
.sb{height:100%;border-radius:3px}
.ni2{border-left:3px solid var(--acc);padding:10px 12px;background:var(--s2);border-radius:0 6px 6px 0;margin-bottom:8px;position:relative}
.nm{font-size:11px;color:var(--t3);margin-bottom:4px;font-family:monospace}
.nt{font-size:13px;line-height:1.5}
.di{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--sur);border:1px solid var(--bdr);border-radius:6px;margin-bottom:8px}
.di:hover{border-color:var(--acc)}
.dic{width:36px;height:36px;background:var(--rbg);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dic svg{width:18px;height:18px;color:var(--red)}
.uz{border:2px dashed var(--b2);border-radius:6px;padding:20px;text-align:center;cursor:pointer;color:var(--t3);font-size:13px}
.uz:hover{border-color:var(--acc);color:var(--acc);background:var(--abg)}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.pc{border-radius:6px;overflow:hidden;border:1px solid var(--bdr);background:var(--s2)}
.pc:hover{border-color:var(--acc)}
.pth{width:100%;height:110px;object-fit:cover;display:block}
.pph{width:100%;height:110px;display:flex;align-items:center;justify-content:center;background:var(--s3)}
.ain{background:var(--amg);border:1px solid #e8d090;border-radius:6px;padding:12px;font-size:12px;color:var(--amb);margin-bottom:16px;line-height:1.6}
.spin{width:32px;height:32px;border:3px solid #d8b8f0;border-top-color:var(--pur);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.xt{width:100%;border-collapse:collapse;font-size:12px}
.xt th{background:var(--s2);padding:6px 8px;text-align:left;font-weight:600;font-size:11px;border-bottom:1px solid var(--bdr)}
.xt td{padding:5px 6px;border-bottom:1px solid var(--bdr)}
.xt input,.xt select{width:100%;padding:3px 6px;border:1px solid var(--bdr);border-radius:3px;font-size:12px;font-family:inherit;background:var(--sur)}
.pi{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.pi:hover{border-color:var(--acc)}
.pic{width:36px;height:36px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pic svg{width:18px;height:18px;fill:#fff}
.es{text-align:center;padding:40px;color:var(--t3);font-size:14px}
input[type=file]{display:none}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 200px);min-height:400px}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-bubble{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.chat-bubble.user{background:var(--acc);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-bubble.ai{background:var(--s2);color:var(--txt);align-self:flex-start;border-bottom-left-radius:4px}
.chat-bubble.ai strong{color:var(--acc)}
.chat-bubble.thinking{background:var(--s2);color:var(--t3);align-self:flex-start;font-style:italic}
.chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--bdr);background:var(--sur)}
.chat-input-row textarea{flex:1;padding:8px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:40px;max-height:120px}
.chat-input-row textarea:focus{border-color:var(--acc)}
.suggestion-chips{display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px 0}
.chip{background:var(--s2);border:1px solid var(--bdr);border-radius:16px;padding:4px 12px;font-size:12px;color:var(--t2);cursor:pointer;white-space:nowrap}
.chip:hover{background:var(--abg);border-color:var(--acc);color:var(--acc)}
</style>
</head>
<body>
<div id="loginScreen" style="position:fixed;inset:0;background:#1a1714;z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
    <div style="width:36px;height:36px;background:#c85a1a;border-radius:7px;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></div>
    <div style="font-family:monospace;font-size:18px;font-weight:500;color:#fff;letter-spacing:.04em">CONSTRUCT<span style="color:#c85a1a">TRACK</span></div>
  </div>
  <div style="color:#8a8580;font-size:12px;margin-bottom:4px">Sign in with Google to access your projects</div>
  <div id="googleSignInBtn"></div>
  <div id="loginErr" style="display:none;color:#e87070;font-size:11px;max-width:300px;text-align:center;margin-top:4px"></div>
  <div style="color:#3a3530;font-size:11px;margin-top:12px;text-align:center">Data stored securely in Google Sheets<br>Synced across all devices</div>
</div>
<div id="syncBar" style="position:fixed;bottom:0;left:0;right:0;background:#1a1714;color:#8a8580;font-size:11px;padding:4px 16px;z-index:9000;display:none;align-items:center;gap:8px">
  <div style="width:10px;height:10px;border:1.5px solid #5a5550;border-top-color:#c85a1a;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0"></div>
  <span id="syncMsg">Saving...</span>
</div>
<div class="app">
  <div class="topbar">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></div>
    <h1>CONSTRUCT<span style="color:var(--acc)">TRACK</span></h1>
    <div class="spacer"></div>
    <select class="psel" id="topSel"><option value="">&#8212; Select Project &#8212;</option></select>
    <button class="tbtn" id="btnNewProj">+ New Project</button>
    <button class="tbtn" id="btnShare" style="background:var(--pur)">&#128100; Share</button>
    <div style="display:flex;align-items:center;gap:8px;margin-left:4px">
      <img id="userAvatar" style="width:26px;height:26px;border-radius:50%;display:none">
      <span id="userName" style="color:#c8c4c0;font-size:12px"></span>
      <button class="tbtn" id="btnSignOut" style="display:none;background:transparent;border:1px solid #5a5550;font-size:11px;padding:3px 8px">Sign out</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="snav">
        <div class="nsec">Views</div>
        <div class="ni active" data-view="ov" id="nav-ov"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Overview</div>
        <div class="ni" data-view="gantt" id="nav-gantt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>Gantt Chart</div>
        <div class="ni" data-view="ms" id="nav-ms"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,11 12,14 22,4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Task Checklist</div>
        <div class="ni" data-view="ph" id="nav-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>Photos</div>
        <div class="ni" data-view="sov" id="nav-sov"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Schedule of Values</div>
        <div class="ni" data-view="docs" id="nav-docs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>Documents</div>
        <div class="ni" data-view="notes" id="nav-notes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Notes</div>
    <div class="ni" data-view="perf" id="nav-perf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Performance</div>
        <div class="ni" data-view="ai" id="nav-ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>Ask Claude</div>
        <div class="nsec" style="margin-top:12px">Projects</div>
        <div id="sProjList"></div>
      </div>
      <div class="sbot" id="sbot" style="display:none">
        <div class="pcm">
          <div style="color:var(--t3);margin-bottom:4px;font-size:11px">Active project</div>
          <div class="pcm-n" id="pcmN">-</div>
          <div class="pcm-p"><div class="pcm-b" id="pcmB" style="width:0%"></div></div>
          <div style="text-align:right;color:var(--t3);margin-top:3px;font-size:11px" id="pcmP">0%</div>
        </div>
      </div>
    </div>
    <div class="content" id="mainContent">
      <div id="view-ov"></div>
      <div id="view-gantt" style="display:none"></div>
      <div id="view-ms" style="display:none"></div>
      <div id="view-ph" style="display:none"></div>
      <div id="view-sov" style="display:none"></div>
      <div id="view-docs" style="display:none"></div>
      <div id="view-notes" style="display:none"></div>
      <div id="view-ai" style="display:none"></div>
      <div id="view-perf" style="display:none"></div>
    </div>
  </div>
</div>
<div id="MC" style="position:fixed;inset:0;z-index:9999;pointer-events:none"></div>
<input type="file" id="mspfi" accept=".xml,.csv,.txt">
<input type="file" id="g702fi" accept=".pdf,application/pdf">
<input type="file" id="schedfi" accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/*">
<input type="file" id="phfi" accept="image/*">
<input type="file" id="docfi" accept=".pdf,application/pdf">

<script>
var S={projects:[],cur:null,apiKey:''};
var V='ov';
var IGS={pid:null,b64:null,du:null,file:null,items:[],meta:{}};
var ISS={pid:null,b64:null,file:null,isImage:false,mediaType:'application/pdf',tasks:[],meta:{}};
var MSP={pid:null,tasks:[],fileName:''};

// ── CONFIG ──────────────────────────────────────────────────
var CLIENT_ID_G="259016321752-j9o5f8iuhrtun8gm06qdb1c1bp4vjmbb.apps.googleusercontent.com";
var SHEET_ID_G="1nrlRcO7iTKwVEHg-E50pmwaVfkaJWH9spljn3SaQPX4";
var SCOPES_G="https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/tasks";
var GS={token:null,user:null,tokenExpiry:0,tokenClient:null};

function isTokenValid(){
  return GS.token && Date.now() < GS.tokenExpiry - 60000; // refresh 1min before expiry
}

async function getValidToken(){
  if(isTokenValid())return GS.token;
  // Token expired - request a new one silently
  return new Promise(function(resolve,reject){
    if(!GS.tokenClient){reject(new Error('Not authenticated'));return;}
    GS.tokenClient.callback=function(tr){
      if(tr.error){reject(new Error(tr.error));return;}
      GS.token=tr.access_token;
      GS.tokenExpiry=Date.now()+(tr.expires_in||3600)*1000;
      resolve(GS.token);
    };
    GS.tokenClient.requestAccessToken({prompt:'consent'});
  });
}

function localSave(){try{localStorage.setItem('ct_cache',JSON.stringify({projects:S.projects,cur:S.cur,apiKey:S.apiKey}));}catch(e){}}
function localLoad(){try{var r=localStorage.getItem('ct_cache');if(r){var d=JSON.parse(r);if(d.projects)S.projects=d.projects;if(d.cur)S.cur=d.cur;if(d.apiKey)S.apiKey=d.apiKey;}}catch(e){}}

function showSync(msg){var b=document.getElementById('syncBar');if(b){b.style.display='flex';var m=document.getElementById('syncMsg');if(m)m.textContent=msg||'Saving...';}}
function hideSync(){var b=document.getElementById('syncBar');if(b)b.style.display='none';}

async function shGet(range){
  var tok=await getValidToken();
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID_G+'/values/'+encodeURIComponent(range),{headers:{Authorization:'Bearer '+tok}});
  if(r.status===401){GS.token=null;throw new Error('Token expired - please refresh the page');}
  if(!r.ok)throw new Error('Read failed '+r.status);
  var d=await r.json();return d.values||[];
}
async function shSet(range,values){
  var tok=await getValidToken();
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID_G+'/values/'+encodeURIComponent(range)+'?valueInputOption=RAW',{method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({range:range,majorDimension:'ROWS',values:values})});
  if(r.status===401){GS.token=null;throw new Error('Token expired - please refresh the page');}
}
async function shClear(sheet){
  var tok=await getValidToken();
  await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID_G+'/values/'+encodeURIComponent(sheet+'!A1:ZZ9999')+':clear',{method:'POST',headers:{Authorization:'Bearer '+tok}});
}

async function ensureSheets(){
  var tok=await getValidToken();
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID_G,{headers:{Authorization:'Bearer '+tok}});
  var d=await r.json();
  var ex=(d.sheets||[]).map(function(s){return s.properties.title;});
  var need=['Projects','Tasks','SOV','Milestones','Notes','Documents','Shared'];
  var add=need.filter(function(n){return ex.indexOf(n)<0;});
  if(!add.length)return;
  await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID_G+':batchUpdate',{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({requests:add.map(function(t){return{addSheet:{properties:{title:t}}}; })})});
}

async function save(){
  localSave();
  if(!GS.token)return;
  showSync('Saving...');
  try{
    await ensureSheets();
    var em=GS.user?GS.user.email:'';
    // Save all projects - both owned and shared
    // For shared projects, we update their data too (editors can modify)
    var ps=S.projects;
    await shClear('Projects');
    var pr=[['id','name','client','address','status','start','end','desc','owner']];
    ps.forEach(function(p){pr.push([p.id,p.name||'',p.client||'',p.address||'',p.status||'',p.start||'',p.end||'',p.desc||'',p.owner||em]);});
    if(pr.length>1)await shSet('Projects!A1',pr);
    await shClear('Tasks');
    var tr=[['pid','id','wbs','name','start','end','duration','preds','status','progress']];
    ps.forEach(function(p){(p.tasks||[]).forEach(function(t){tr.push([p.id,t.id,t.wbs||'',t.name||'',t.start||'',t.end||'',t.duration||0,JSON.stringify(t.preds||[]),t.status||'',t.progress||0]);});});
    if(tr.length>1)await shSet('Tasks!A1',tr);
    await shClear('SOV');
    var sr=[['pid','id','desc','sv','billed','paid','due','paidDate']];
    ps.forEach(function(p){(p.sov||[]).forEach(function(s){sr.push([p.id,s.id,s.desc||'',s.sv||0,s.billed||0,s.paid||0,s.due||'',s.paidDate||'']);});});
    if(sr.length>1)await shSet('SOV!A1',sr);
    await shClear('Milestones');
    var mr=[['pid','id','name','due','done','note','visibility','gtaskId','createdBy']];
    ps.forEach(function(p){(p.milestones||[]).forEach(function(m){mr.push([p.id,m.id,m.name||'',m.due||'',m.done?'TRUE':'FALSE',m.note||'',m.visibility||'shared',m.gtaskId||'',m.createdBy||'']);});});
    if(mr.length>1)await shSet('Milestones!A1',mr);
    await shClear('Notes');
    var nr=[['pid','id','date','author','text']];
    ps.forEach(function(p){(p.notes||[]).forEach(function(n){nr.push([p.id,n.id,n.date||'',n.author||'',n.text||'']);});});
    if(nr.length>1)await shSet('Notes!A1',nr);
    await shClear('Documents');
    var dr=[['pid','id','name','type','date','url']];
    ps.forEach(function(p){(p.documents||[]).forEach(function(d){dr.push([p.id,d.id,d.name||'',d.type||'',d.date||'',d.url||'']);});});
    if(dr.length>1)await shSet('Documents!A1',dr);
    hideSync();
  }catch(err){hideSync();console.error('Save error:',err);showSync('Save failed — check connection');setTimeout(hideSync,3000);}
}

async function loadFromSheets(){
  if(!GS.token)return;
  showSync('Loading...');
  try{
    await ensureSheets();
    var em=GS.user?GS.user.email:'';
    // Load shared project IDs for this user
    var sharedPids=[];
    try{
      var shRows=await shGet('Shared!A2:B9999');
      shRows.forEach(function(r){
        if(r[1]&&r[1].toLowerCase()===em.toLowerCase())sharedPids.push(r[0]);
      });
    }catch(e){}

    var pRows=await shGet('Projects!A2:I9999');
    var projects=[];
    pRows.forEach(function(r){
      if(!r[0])return;
      var ow=r[8]||'';
      // Include if owner OR if shared with this user
      var isOwner=!ow||ow.toLowerCase()===em.toLowerCase();
      var isShared=sharedPids.indexOf(r[0])>=0;
      if(!isOwner&&!isShared)return;
      projects.push({id:r[0],name:r[1]||'',client:r[2]||'',address:r[3]||'',
        status:r[4]||'active',start:r[5]||'',end:r[6]||'',desc:r[7]||'',
        owner:ow||em,shared:isShared&&!isOwner,
        tasks:[],sov:[],milestones:[],notes:[],documents:[]});
    });
    function fp(pid){return projects.find(function(p){return p.id===pid;});}
    var tRows=await shGet('Tasks!A2:J9999');
    tRows.forEach(function(r){if(!r[0]||!r[1])return;var p=fp(r[0]);if(!p)return;p.tasks.push({id:r[1],wbs:r[2]||'',name:r[3]||'',start:r[4]||'',end:r[5]||'',duration:parseInt(r[6])||0,preds:JSON.parse(r[7]||'[]'),status:r[8]||'upcoming',progress:parseInt(r[9])||0});});
    var sRows=await shGet('SOV!A2:H9999');
    sRows.forEach(function(r){if(!r[0]||!r[1])return;var p=fp(r[0]);if(!p)return;p.sov.push({id:r[1],desc:r[2]||'',sv:parseFloat(r[3])||0,billed:parseFloat(r[4])||0,paid:parseFloat(r[5])||0,due:r[6]||'',paidDate:r[7]||''});});
    var mRows=await shGet('Milestones!A2:F9999');
    mRows.forEach(function(r){if(!r[0]||!r[1])return;var p=fp(r[0]);if(!p)return;p.milestones.push({id:r[1],name:r[2]||'',due:r[3]||'',done:r[4]==='TRUE',note:r[5]||'',visibility:r[6]||'shared',gtaskId:r[7]||'',createdBy:r[8]||''});});
    var nRows=await shGet('Notes!A2:E9999');
    nRows.forEach(function(r){if(!r[0]||!r[1])return;var p=fp(r[0]);if(!p)return;p.notes.push({id:r[1],date:r[2]||'',author:r[3]||'',text:r[4]||''});});
    var dRows=await shGet('Documents!A2:F9999');
    dRows.forEach(function(r){if(!r[0]||!r[1])return;var p=fp(r[0]);if(!p)return;p.documents.push({id:r[1],name:r[2]||'',type:r[3]||'',date:r[4]||'',url:r[5]||''});});
    S.projects=projects;
    if(projects.length&&(!S.cur||!projects.find(function(p){return p.id===S.cur;}))){S.cur=projects[0].id;}
    if(!projects.length)seed();
    localSave();hideSync();render();
  // Background sync Google Tasks after data loads
  setTimeout(function(){if(V==='ms')backgroundTaskSync();},1500);
  }catch(err){hideSync();console.error('Load error:',err);if(!S.projects.length)seed();render();}
}

function initGoogleSignIn(){
  if(typeof google==='undefined'||!google.accounts){
    setTimeout(initGoogleSignIn,200);return;
  }
  try{
    google.accounts.id.initialize({client_id:CLIENT_ID_G,callback:onGSignIn,auto_select:false});
    var btn=document.getElementById('googleSignInBtn');
    if(btn){
      google.accounts.id.renderButton(btn,{theme:'filled_black',size:'large',text:'signin_with',shape:'rectangular',width:260});
    }
    // Also try One Tap prompt
    google.accounts.id.prompt(function(notification){
      // If One Tap dismissed or skipped, button is still there
    });
  }catch(e){
    console.error('GSI init error:',e);
    setTimeout(initGoogleSignIn,500);
  }
}

function onGSignIn(response){
  var payload=JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  GS.user={email:payload.email,name:payload.name,picture:payload.picture};
  GS.tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID_G,scope:SCOPES_G,callback:function(tr){
    if(tr.error){var e=document.getElementById('loginErr');if(e){e.textContent='Auth error: '+tr.error;e.style.display='block';}return;}
    GS.token=tr.access_token;
    GS.tokenExpiry=Date.now()+(tr.expires_in||3600)*1000;
    var ls=document.getElementById('loginScreen');if(ls)ls.style.display='none';
    var av=document.getElementById('userAvatar');if(av){av.src=GS.user.picture||'';av.style.display='block';}
    var un=document.getElementById('userName');if(un)un.textContent=GS.user.name;
    var so=document.getElementById('btnSignOut');if(so)so.style.display='block';
    loadFromSheets();
  }});
  GS.tokenClient.requestAccessToken({prompt:''});
}

function signOut(){
  if(typeof google!=='undefined')google.accounts.id.disableAutoSelect();
  GS.token=null;GS.user=null;S.projects=[];S.cur=null;
  var ls=document.getElementById('loginScreen');if(ls)ls.style.display='flex';
  var av=document.getElementById('userAvatar');if(av)av.style.display='none';
  var un=document.getElementById('userName');if(un)un.textContent='';
  var so=document.getElementById('btnSignOut');if(so)so.style.display='none';
  initGoogleSignIn();
}

async function fetchWeather(p){
  _weatherProject=p;
  var wEl=document.getElementById('weatherContent');
  if(!wEl)return;
  try{
    // Step 1: Geocode address - try multiple strategies
    var lat=null,lon=null;
    var addressVariants=[
      p.address,
      // Strip unit/suite numbers that confuse geocoders
      p.address.replace(/,?\s*(suite|ste|unit|apt|#)\s*\w+/gi,'').trim(),
      // Try just city, state portion
      p.address.split(',').slice(-2).join(',').trim(),
      // Try just city, state, zip if available
      p.address.split(',').slice(-1).join(',').trim()
    ];
    for(var ai=0;ai<addressVariants.length;ai++){
      var variant=addressVariants[ai];
      if(!variant||variant.length<3)continue;
      try{
        var geoUrl='https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(variant)+'&format=json&limit=3&addressdetails=1';
        var geoResp=await fetch(geoUrl,{headers:{'Accept':'application/json','User-Agent':'ConstructTrack/1.0'}});
        var geoData=await geoResp.json();
        if(geoData&&geoData.length){
          lat=parseFloat(geoData[0].lat);
          lon=parseFloat(geoData[0].lon);
          break;
        }
      }catch(geoErr){continue;}
    }
    if(!lat||!lon){
      wEl.innerHTML='<div style="color:var(--t3);font-size:12px;padding:8px">'+
        'Could not locate address for weather data.<br>'+
        '<span style="font-size:10px">Try updating the project address to include city, state, and zip code.</span>'+
        '</div>';return;
    }

    // Step 2: Calculate date range
    var startDate=p.start||today();
    // Open-Meteo supports up to 92 past days on free tier - use 30 days for bar chart
    var thirtyDaysAgo=addDays(today(),-30)||today();
    var chartStart=thirtyDaysAgo>startDate?thirtyDaysAgo:startDate;

    // Step 3: Fetch rainfall - two calls: project total + 30 day chart
    var totalUrl='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+
      '&daily=precipitation_sum&start_date='+startDate+'&end_date='+today()+'&timezone=auto&precipitation_unit=inch';
    var chartUrl='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+
      '&daily=precipitation_sum&start_date='+chartStart+'&end_date='+today()+'&timezone=auto&precipitation_unit=inch';

    var totalResp=await fetch(totalUrl);
    var totalData=await totalResp.json();
    var chartResp=await fetch(chartUrl);
    var chartData=await chartResp.json();

    if(!totalData.daily||!chartData.daily){wEl.innerHTML='<div style="color:var(--t3);font-size:11px">Weather data unavailable.</div>';return;}

    // Calculate total rainfall since project start
    var totalRain=(totalData.daily.precipitation_sum||[]).reduce(function(a,v){return a+(v||0);},0);

    // Build bar chart data (last 30 days)
    var chartDates=chartData.daily.time||[];
    var chartRain=chartData.daily.precipitation_sum||[];
    var maxRain=Math.max.apply(null,chartRain.filter(function(v){return v!=null;}));
    if(maxRain===0)maxRain=0.1; // avoid division by zero

    // Render
    var W=280,H=80,barW=Math.max(2,Math.floor(W/chartDates.length)-1);
    var bars=chartDates.map(function(d,i){
      var v=chartRain[i]||0;
      var bH=Math.round((v/maxRain)*H);
      var x=i*(barW+1);
      var fill=v>0.5?'#378ADD':v>0?'#B5D4F4':'var(--bdr)';
      return '<rect x="'+x+'" y="'+(H-bH)+'" width="'+barW+'" height="'+Math.max(1,bH)+'" fill="'+fill+'" rx="1"/>';
    }).join('');

    // Month labels for x-axis
    var monthLabels='';var lastMonth='';
    chartDates.forEach(function(d,i){
      var m=new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short'});
      if(m!==lastMonth){
        var x=i*(barW+1);
        monthLabels+='<text x="'+x+'" y="'+(H+14)+'" font-size="8" fill="var(--t3)">'+m+'</text>';
        lastMonth=m;
      }
    });

    wEl.innerHTML=
      '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px">'+
      '<div>'+
        '<div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em">Accumulated since '+fmtD(startDate)+'</div>'+
        '<div style="font-size:22px;font-weight:500;font-family:var(--font-mono)">'+totalRain.toFixed(2)+'"</div>'+
        '<div style="font-size:10px;color:var(--t3)">total rainfall</div>'+
      '</div>'+
      '<div style="text-align:right">'+
        '<div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em">Last 30 days</div>'+
        '<div style="font-size:16px;font-weight:500;font-family:var(--font-mono)">'+(chartRain.reduce(function(a,v){return a+(v||0);},0)).toFixed(2)+'"</div>'+
        '<div style="font-size:10px;color:var(--t3)">'+lat.toFixed(2)+'&deg;N '+Math.abs(lon).toFixed(2)+'&deg;W</div>'+
      '</div>'+
      '</div>'+
      '<svg viewBox="0 0 '+W+' '+(H+20)+'" style="width:100%;overflow:visible">'+bars+monthLabels+'</svg>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-top:4px;font-size:9px;color:var(--t3)">'+
      '<rect width="8" height="8" fill="#378ADD" rx="1" style="display:inline-block"></rect>&gt;0.5" &nbsp;'+
      '<rect width="8" height="8" fill="#B5D4F4" rx="1" style="display:inline-block"></rect>&lt;0.5" &nbsp;'+
      'Source: Open-Meteo</div>';

  }catch(err){
    if(wEl)wEl.innerHTML='<div style="color:var(--t3);font-size:11px">Weather data unavailable: '+err.message+'</div>';
  }
}

function rGantt(){
  var el=document.getElementById('view-gantt');
  var p=CP();if(!p){el.innerHTML=noP();return;}
  // Fix any predecessor violations without touching correctly-placed tasks
  var hadViolations=recalcViolations(p);
  if(hadViolations)save();
  var tasks=p.tasks||[];
  if(!tasks.length){
    el.innerHTML='<div class="ph"><div><div class="pt">Gantt Chart</div><div class="ps">'+esc(p.name)+'</div></div>'+
      '<div class="pa"><button class="btn bv" data-action="importMSP" data-pid="'+p.id+'">&#128196; Import MS Project</button>'+
      '<button class="btn bv" data-action="importSched" data-pid="'+p.id+'">&#11014; Import Schedule PDF</button>'+
      '<button class="btn bp" data-action="newTask" data-pid="'+p.id+'">+ Add Task</button></div></div>'+
      '<div class="card"><div class="es">No tasks yet.</div></div>';return;
  }

  // ── CPM CALCULATION ────────────────────────────────────────
  var taskMap={};
  tasks.forEach(function(t){taskMap[t.id]=t;});

  function dateToN(d){return d?Math.round((new Date(d+'T00:00:00')-new Date('2020-01-01T00:00:00'))/864e5):0;}
  function nToDate(n){var d=new Date('2020-01-01T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
  function dur(t){return Math.max(1,dateToN(t.end)-dateToN(t.start));}

  // Forward pass — compute Early Start (ES) and Early Finish (EF)
  var ES={},EF={};
  tasks.forEach(function(t){ES[t.id]=dateToN(t.start);EF[t.id]=dateToN(t.end);});

  // Topological sort
  var sorted=[];var visited={};
  function visit(t){
    if(visited[t.id])return;visited[t.id]=true;
    (t.preds||[]).forEach(function(pr){var pt=taskMap[pr.id];if(pt)visit(pt);});
    sorted.push(t);
  }
  tasks.forEach(function(t){visit(t);});

  sorted.forEach(function(t){
    var es=dateToN(t.start);
    (t.preds||[]).forEach(function(pr){
      var pt=taskMap[pr.id];if(!pt)return;
      var lag=pr.lag||0;
      var cand;
      if(pr.type==='FS')cand=EF[pt.id]+lag;
      else if(pr.type==='SS')cand=ES[pt.id]+lag;
      else if(pr.type==='FF')cand=EF[pt.id]+lag-dur(t);
      else if(pr.type==='SF')cand=ES[pt.id]+lag-dur(t);
      else cand=EF[pt.id]+lag;
      if(cand>es)es=cand;
    });
    ES[t.id]=es;
    EF[t.id]=es+dur(t);
  });

  // Backward pass — compute Late Start (LS) and Late Finish (LF)
  var projectEnd=Math.max.apply(null,tasks.map(function(t){return EF[t.id];}));
  var LS={},LF={};
  tasks.forEach(function(t){LF[t.id]=projectEnd;LS[t.id]=projectEnd-dur(t);});

  var reverseSorted=sorted.slice().reverse();
  reverseSorted.forEach(function(t){
    var lf=projectEnd;
    tasks.forEach(function(succ){
      (succ.preds||[]).forEach(function(pr){
        if(pr.id!==t.id)return;
        var lag=pr.lag||0;var cand;
        if(pr.type==='FS')cand=LS[succ.id]-lag;
        else if(pr.type==='SS')cand=LS[succ.id]-lag+dur(t);
        else if(pr.type==='FF')cand=LF[succ.id]-lag;
        else if(pr.type==='SF')cand=LF[succ.id]-lag+dur(t);
        else cand=LS[succ.id]-lag;
        if(cand<lf)lf=cand;
      });
    });
    LF[t.id]=lf;
    LS[t.id]=lf-dur(t);
  });

  // Float and critical path
  var float={},critical={};
  tasks.forEach(function(t){
    float[t.id]=LS[t.id]-ES[t.id];
    critical[t.id]=(float[t.id]<=0);
  });

  // ── GANTT RENDER ───────────────────────────────────────────
  var allDates=tasks.reduce(function(a,t){if(t.start)a.push(t.start);if(t.end)a.push(t.end);return a;},[]).sort();
  var minD=allDates[0],maxD=allDates[allDates.length-1];
  var totalDays=Math.max(dif(minD,maxD),30);
  var LW=240,CW=Math.max(700,totalDays*4);

  var months=[];
  var cur=new Date(minD+'T00:00:00');cur.setDate(1);
  while(cur<=new Date(maxD+'T00:00:00')){
    var ms2=new Date(cur),me=new Date(cur.getFullYear(),cur.getMonth()+1,0);
    var s=Math.max(0,dif(minD,ms2.toISOString().slice(0,10)));
    var e2=Math.min(totalDays,dif(minD,me.toISOString().slice(0,10)));
    if(e2>s)months.push({l:cur.toLocaleDateString('en-US',{month:'short',year:'2-digit'}),left:s/totalDays*100,w:(e2-s)/totalDays*100});
    cur.setMonth(cur.getMonth()+1);
  }
  var tod=Math.min(100,Math.max(0,dif(minD,today())/totalDays*100));
  var ROW_H=36;

  var h='<div class="ph"><div><div class="pt">Gantt Chart</div><div class="ps">'+esc(p.name)+
    ' &middot; <span style="color:var(--red);font-size:12px">&#9632;</span> Critical Path &nbsp;'+
    '<span style="color:var(--blu);font-size:12px">&#9632;</span> Non-critical</div></div>'+
    '<div class="pa"><button class="btn bv" data-action="importMSP" data-pid="'+p.id+'">&#128196; Import MS Project</button>'+
    '<button class="btn bv" data-action="importSched" data-pid="'+p.id+'">&#11014; Import Schedule PDF</button>'+
    '<button class="btn bp" data-action="newTask" data-pid="'+p.id+'">+ Add Task</button>'+
    '<button class="btn bg2 bxs" data-action="recalcAll" data-pid="'+p.id+'" title="Recalculate all dates from predecessors">&#8635; Recalc Dates</button></div></div>'+
    '<div class="card" style="padding:0;overflow:hidden"><div class="gz" id="ganttScroll">'+
    '<div style="display:flex;min-width:'+(LW+CW)+'px">'+
    '<div style="width:'+LW+'px;flex-shrink:0;background:var(--s2);border-right:1px solid var(--bdr);display:flex;">'+
    '<div style="flex:1;padding:8px 10px;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em">Task</div>'+
    '<div style="width:50px;padding:8px 4px;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;text-align:center">Float</div></div>'+
    '<div style="flex:1;position:relative;height:'+ROW_H+'px;border-bottom:1px solid var(--bdr)">'+
    months.map(function(m){return '<div style="position:absolute;left:'+m.left+'%;width:'+m.w+'%;border-right:1px solid var(--bdr);height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t3);font-family:monospace;overflow:hidden">'+m.l+'</div>';}).join('')+
    '<div style="position:absolute;left:'+tod+'%;top:0;bottom:0;width:2px;background:var(--acc);opacity:.8"></div></div></div>';

  // SVG overlay for dependency arrows
  var arrowsSVG='';

  tasks.forEach(function(t,idx){
    var isCrit=critical[t.id];
    var fl=float[t.id];
    var ts=dif(minD,t.start)/totalDays*100;
    var te=dif(minD,t.end)/totalDays*100;
    var bw=Math.max(0.5,te-ts);
    var barColor=isCrit?'var(--red)':'var(--blu)';
    var floatPx=Math.max(0,fl/totalDays*CW);
    var barLeft=ts/100*CW;
    var barRight=(ts+bw)/100*CW;
    var rowTop=ROW_H*(idx+1);

    // Float bar
    if(!isCrit&&fl>0){
      arrowsSVG+='<rect x="'+barRight+'" y="'+(rowTop+12)+'" width="'+Math.min(floatPx,CW-barRight)+'" height="12" fill="var(--b2)" opacity="0.4" rx="2"/>';
    }

    // Dependency arrows
    (t.preds||[]).forEach(function(pr){
      var predIdx=tasks.findIndex(function(x){return x.id===pr.id;});
      if(predIdx<0)return;
      var pt=tasks[predIdx];
      var predTs=dif(minD,pt.start)/totalDays*100;
      var predTe=dif(minD,pt.end)/totalDays*100;
      var predBw=Math.max(0.5,predTe-predTs);
      var x1,y1,x2,y2;
      var predRowTop=ROW_H*(predIdx+1);
      if(pr.type==='FS'){x1=(predTs+predBw)/100*CW;y1=predRowTop+ROW_H/2;x2=ts/100*CW;y2=rowTop+ROW_H/2;}
      else if(pr.type==='SS'){x1=predTs/100*CW;y1=predRowTop+ROW_H/2;x2=ts/100*CW;y2=rowTop+ROW_H/2;}
      else if(pr.type==='FF'){x1=(predTs+predBw)/100*CW;y1=predRowTop+ROW_H/2;x2=(ts+bw)/100*CW;y2=rowTop+ROW_H/2;}
      else{x1=predTs/100*CW;y1=predRowTop+ROW_H/2;x2=(ts+bw)/100*CW;y2=rowTop+ROW_H/2;}
      var mx=(x1+x2)/2;
      arrowsSVG+='<path d="M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'" fill="none" stroke="var(--b2)" stroke-width="1.5" marker-end="url(#arr)"/>';
    });

    h+='<div style="display:flex;min-width:'+(LW+CW)+'px;height:'+ROW_H+'px">'+
      '<div style="width:'+(LW-50)+'px;flex-shrink:0;padding:0 8px;font-size:12px;border-bottom:1px solid var(--bdr);background:var(--sur);display:flex;align-items:center;gap:6px">'+
        '<div class="dot '+(t.status==='complete'?'complete':t.status==='inprog'?'inprog':t.status==='delayed'?'delayed':'upcoming')+'" style="width:8px;height:8px;flex-shrink:0'+(isCrit?';box-shadow:0 0 0 2px var(--red)':'')+'">'+'</div>'+
        '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap'+(isCrit?';font-weight:600':'')+'">'+esc(t.name)+'</span>'+
      '</div>'+
      '<div style="width:50px;flex-shrink:0;border-bottom:1px solid var(--bdr);border-left:1px solid var(--bdr);background:var(--sur);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:monospace;color:'+(isCrit?'var(--red)':'var(--t3)')+'">'+
        (isCrit?'&#9888;':fl+'wd')+
      '</div>'+
      '<div style="flex:1;position:relative;border-bottom:1px solid var(--bdr);background:var(--sur)">'+
        '<div style="position:absolute;left:'+tod+'%;top:0;bottom:0;width:2px;background:var(--acc);opacity:.3;z-index:1"></div>'+
        (!isCrit&&fl>0?'<div style="position:absolute;top:11px;left:calc('+(ts+bw)+'% + 2px);width:calc('+Math.max(0,Math.min(fl/totalDays*100,98-ts-bw))+'% - 2px);height:6px;background:#c2bdb4;border-radius:2px;opacity:0.5"></div>':'')+'<div style="position:absolute;top:8px;left:calc('+ts+'% + 1px);width:calc('+bw+'% - 2px);height:20px;border-radius:3px;background:'+barColor+';opacity:'+(t.status==='complete'?.7:1)+';display:flex;align-items:center;padding:0 5px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;z-index:2">'+
          (bw>8?t.progress+'%':'')+'</div>'+
      '</div></div>';
  });

  // arrow defs removed

  h+='</div>';

  // Inject SVG arrows relative to scroll area
  h=h.replace('<div class="gz" id="ganttScroll">','<div class="gz" id="ganttScroll">');
  // We'll append the SVG after the rows close, inside the gz div

  h+='<div style="display:flex;gap:16px;padding:10px 16px;border-top:1px solid var(--bdr);background:var(--s2);flex-wrap:wrap">'+
    '<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3)"><div style="width:12px;height:3px;background:var(--red)"></div>Critical Path</div>'+
    '<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3)"><div style="width:12px;height:3px;background:var(--blu)"></div>Non-critical</div>'+
    '<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3)"><div style="width:12px;height:6px;background:var(--b2);opacity:.5;border-radius:1px"></div>Float</div>'+
    '<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3)"><div style="width:2px;height:12px;background:var(--acc)"></div>Today</div></div>'+
    '</div>';

  // Task table with predecessor column
  h+='<div class="card" style="padding:0;overflow-x:auto;margin-top:16px"><table class="st">'+
    '<thead><tr><th>WBS</th><th>Task</th><th>Start</th><th>End</th><th>Dur (d)</th><th>Predecessors</th><th>Status</th><th>%</th><th>Float</th><th>Actions</th></tr></thead><tbody>'+
    tasks.map(function(t){
      var isCrit=critical[t.id];
      var fl=float[t.id];
      var predStr=(t.preds||[]).map(function(pr){
        var pt=taskMap[pr.id];
        var wbs=pt?(pt.wbs||'?'):'?';
        return wbs+pr.type+(pr.lag?'+'+pr.lag:'');
      }).join(', ');
      return '<tr style="'+(isCrit?'background:#fff8f8':'')+'">' +
        '<td class="mn" style="color:var(--t3)">'+(t.wbs||'')+'</td>'+
        '<td style="font-weight:'+(isCrit?'600':'400')+';color:'+(isCrit?'var(--red)':'inherit')+'">'+esc(t.name)+'</td>'+
        '<td class="mn">'+fmtD(t.start)+'</td>'+
        '<td class="mn">'+fmtD(t.end)+'</td>'+
        '<td class="mn" style="text-align:center">'+(t.duration||dur2(t))+'</td>'+
        '<td class="mn" style="color:var(--t2)">'+(predStr||'—')+'</td>'+
        '<td>'+bdg(t.status)+'</td>'+
        '<td class="mn" style="text-align:center">'+t.progress+'%</td>'+
        '<td class="mn" style="text-align:center;color:'+(isCrit?'var(--red)':'var(--t3)')+'">'+( isCrit?'&#9888; Critical':fl+'d')+'</td>'+
        '<td><div style="display:flex;gap:4px">'+
        '<button class="btn bg2 bxs" data-action="editTask" data-pid="'+p.id+'" data-id="'+t.id+'">Edit</button>'+
        '<button class="btn bd bxs" data-action="delTask" data-pid="'+p.id+'" data-id="'+t.id+'">Del</button>'+
        '</div></td></tr>';
    }).join('')+
    '</tbody></table></div>';

  el.innerHTML=h;
}

function dur2(t){return t.start&&t.end?Math.max(1,workdayDiff(t.start,t.end)):1;}


function rMs(){
  var el=document.getElementById('view-ms');var p=CP();if(!p){el.innerHTML=noP();return;}
  var myEmail=GS.user?GS.user.email.toLowerCase():'';

  var allTasks=p.milestones||[];
  var tasks=allTasks.filter(function(t){
    if(t.visibility==='personal'){return !t.createdBy||t.createdBy.toLowerCase()===myEmail;}
    return true;
  });
  var done=tasks.filter(function(t){return t.done;}).length;
  var overdue=tasks.filter(function(t){return !t.done&&t.due&&t.due<today();}).length;
  var h='<div class="ph"><div><div class="pt">Task Checklist</div><div class="ps">'+esc(p.name)+' &middot; '+done+' of '+tasks.length+' complete'+(overdue?' &middot; <span style="color:var(--red)">'+overdue+' overdue</span>':'')+'</div></div>'+
    '<button class="btn bp" data-action="newMs" data-pid="'+p.id+'">+ Add Task</button>'+
    '<button class="btn bv bxs" data-action="syncTasks" data-pid="'+p.id+'" id="syncTasksBtn" style="font-size:11px"><i class="ti ti-refresh" aria-hidden="true"></i> Sync Google Tasks</button>'+
    '<button class="btn bd bxs" data-action="cleanupDupes" data-pid="'+p.id+'" id="cleanupBtn" style="font-size:11px" title="Remove duplicate tasks from both ConstructTrack and Google Tasks">&#9003; Fix Duplicates</button>'+
    '</div></div>';
  if(!tasks.length){el.innerHTML=h+'<div class="card"><div class="es">No tasks yet. Add action items, submittals, RFIs, or anything that needs tracking.</div></div>';return;}
  // Group: overdue, then pending, then done
  var overdueTasks=tasks.filter(function(t){return !t.done&&t.due&&t.due<today();}).sort(function(a,b){return (a.due||'').localeCompare(b.due||'');});
  var pendingTasks=tasks.filter(function(t){return !t.done&&!(t.due&&t.due<today());}).sort(function(a,b){return (a.due||'9').localeCompare(b.due||'9');});
  var doneTasks=tasks.filter(function(t){return t.done;}).sort(function(a,b){return (b.due||'').localeCompare(a.due||'');});
  function taskCard(t){
    var isOverdue=!t.done&&t.due&&t.due<today();

      '<input type="checkbox"'+(t.done?' checked':'')+' data-action="toggleTask" data-pid="'+p.id+'" data-id="'+t.id+'" style="width:18px;height:18px;margin-top:2px;cursor:pointer;accent-color:var(--grn);flex-shrink:0">'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:14px;font-weight:500;color:var(--txt)'+(t.done?';text-decoration:line-through;color:var(--t3)':'')+'">'+ esc(t.name)+'</div>'+
        (t.due?'<div style="font-size:11px;font-family:monospace;margin-top:3px;color:'+(isOverdue?'var(--red)':t.done?'var(--t3)':'var(--t2)')+'">'+( isOverdue?'Overdue &mdash; ':'Due ')+ fmtD(t.due)+'</div>':'')+''+
        (t.note?'<div style="font-size:12px;color:var(--t2);margin-top:5px;line-height:1.5;background:var(--s2);border-radius:4px;padding:6px 8px;white-space:pre-wrap">'+esc(t.note)+'</div>':'')+''+
      '</div>'+
      '<div style="display:flex;gap:4px;flex-shrink:0">'+
        '<button class="btn bg2 bxs" data-action="editMs" data-pid="'+p.id+'" data-id="'+t.id+'">Edit</button>'+
        '<button class="btn bd bxs" data-action="delMs" data-pid="'+p.id+'" data-id="'+t.id+'">Del</button>'+
      '</div></div>';
  }
  if(overdueTasks.length){
    h+='<div class="card" style="border-color:var(--red);padding:12px 16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--red);margin-bottom:4px">Overdue</div>'+overdueTasks.map(taskCard).join('')+'</div>';
  }

  }
  if(doneTasks.length){
    h+='<div class="card" style="padding:12px 16px;opacity:.75"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:4px">Completed ('+doneTasks.length+')</div>'+doneTasks.map(taskCard).join('')+'</div>';
  }
  el.innerHTML=h;
}

  var tP=sov.reduce(function(a,s){return a+(s.paid||0);},0);
  var h='<div class="ph"><div><div class="pt">Schedule of Values</div><div class="ps">'+esc(p.name)+'</div></div>'+

    '<div class="card" style="padding:0;overflow-x:auto"><table class="st"><thead><tr><th>Description</th><th>Scheduled Value</th><th>Billed</th><th>Paid</th><th>Outstanding</th><th>Due Date</th><th>Paid Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
  sov.forEach(function(s){
    var out=(s.billed||0)-(s.paid||0);var overdue=s.due&&s.due<today()&&out>0;
    var bp=s.sv?Math.round((s.billed||0)/s.sv*100):0;var pp=s.sv?Math.round((s.paid||0)/s.sv*100):0;

    else if(s.billed>0&&overdue){bc='del';bl='Overdue';}

    h+='<tr'+(overdue?' style="background:var(--rbg)"':'')+'>'+
      '<td style="font-weight:500">'+esc(s.desc)+'</td><td class="mn">'+fm(s.sv||0)+'</td>'+
      '<td><div class="mn">'+fm(s.billed||0)+'</div><div class="sp"><div class="sb" style="width:'+bp+'%;background:var(--acc)"></div></div></td>'+

// ── PERFORMANCE DASHBOARD ──────────────────────────────────

function calcPlannedPct(task, asOfDate) {
  // What % of this task should be done by asOfDate based on its dates
  if(!task.start||!task.end)return 0;
  if(asOfDate<=task.start)return 0;
  if(asOfDate>=task.end)return 100;
  var totalDays=workdayDiff(task.start,task.end);
  var elapsedDays=workdayDiff(task.start,asOfDate);
  return totalDays>0?Math.min(100,Math.round(elapsedDays/totalDays*100)):0;
}

function calcProjectPV(p, asOfDate) {
  // Planned Value: sum of (task budget * planned % complete) for all tasks
  var total=0;
  (p.tasks||[]).forEach(function(t){
    var budget=getTaskBudget(p,t);
    var pct=calcPlannedPct(t,asOfDate);
    total+=budget*(pct/100);
  });
  return total;
}

function calcProjectEV(p) {
  // Earned Value: sum of (task budget * actual % complete)
  var total=0;
  (p.tasks||[]).forEach(function(t){
    var budget=getTaskBudget(p,t);
    total+=budget*((t.progress||0)/100);
  });
  return total;
}

function getTaskBudget(p, task) {
  // Sum up budget contributions from linked SOV lines
  var total=0;
  (p.sov||[]).forEach(function(s){
    var links=s.taskLinks||[];
    var link=links.find(function(l){return l.taskId===task.id;});
    if(link){total+=(s.sv||0)*(link.split/100);}
  });
  return total;
}

function getTotalBudget(p) {
  return (p.sov||[]).reduce(function(a,s){return a+(s.sv||0);},0);
}

function getTotalLinkedBudget(p) {
  return (p.tasks||[]).reduce(function(a,t){return a+getTaskBudget(p,t);},0);
}

function autoCalcSplits(p, sovId) {
  // Duration-weighted auto split for a SOV line across its linked tasks
  var sov=p.sov.find(function(s){return s.id===sovId;});
  if(!sov||!sov.taskLinks||!sov.taskLinks.length)return;
  var links=sov.taskLinks;
  var tmap={};(p.tasks||[]).forEach(function(t){tmap[t.id]=t;});
  var totalDur=links.reduce(function(a,l){var t=tmap[l.taskId];return a+(t?workdayDiff(t.start,t.end):1);},0);
  if(!totalDur)return;
  var remaining=100;
  links.forEach(function(l,i){
    var t=tmap[l.taskId];
    var dur=t?workdayDiff(t.start,t.end):1;
    if(i===links.length-1){l.split=remaining;}
    else{l.split=Math.round(dur/totalDur*100);remaining-=l.split;}
  });
}

function buildSCurveData(p) {
  // Build daily interpolated S-curve data
  var tasks=p.tasks||[];
  var sov=p.sov||[];
  if(!tasks.length)return null;

  var dates=tasks.reduce(function(a,t){if(t.start)a.push(t.start);if(t.end)a.push(t.end);return a;},[]);
  if(!dates.length)return null;
  dates.sort();
  var minD=dates[0];
  var maxD=dates[dates.length-1];
  // Extend to today if today is beyond maxD
  if(today()>maxD)maxD=today();

  var totalBudget=getTotalLinkedBudget(p);
  if(!totalBudget)return null;

  // Build daily PV points (interpolated)
  var pvPoints=[];
  var cur=new Date(minD+'T00:00:00');
  var end=new Date(maxD+'T00:00:00');
  while(cur<=end){
    var ds=cur.toISOString().slice(0,10);
    pvPoints.push({date:ds,pv:calcProjectPV(p,ds)});
    cur.setDate(cur.getDate()+1);
  }

  // Current EV (single point at today)
  var ev=calcProjectEV(p);

  // Billed history points from G702 imports
  var billedPoints={};
  sov.forEach(function(s){
    (s.billedHistory||[]).forEach(function(h){
      if(!billedPoints[h.date])billedPoints[h.date]=0;
      billedPoints[h.date]+=h.billed||0;
    });
  });
  // Convert to cumulative sorted array
  var billedArr=Object.keys(billedPoints).sort().map(function(d){return{date:d,billed:billedPoints[d]};});
  // Make cumulative
  var cumBilled=0;
  billedArr=billedArr.map(function(b){cumBilled+=b.billed;return{date:b.date,billed:cumBilled};});

  return{pvPoints:pvPoints,ev:ev,billedArr:billedArr,totalBudget:totalBudget,minD:minD,maxD:maxD};
}

function showM(body,wide){var mc=document.getElementById('MC');mc.style.pointerEvents='all';mc.innerHTML='<div class="mdov" onclick="if(event.target===this)closeM()"><div class="md'+(wide?' md-wide':'')+'">'+body+'</div></div>';}
function gv(id){var el=document.getElementById(id);return el?el.value:'';}

function parseMSPXML(content){
  var parser=new DOMParser();
  var doc=parser.parseFromString(content,'application/xml');
  if(doc.querySelector('parsererror'))throw new Error('Invalid XML. Please re-export from MS Project as XML Format.');
  var ns='http://schemas.microsoft.com/project';
  var taskNodes=doc.getElementsByTagNameNS(ns,'Task');
  if(!taskNodes.length)taskNodes=doc.getElementsByTagName('Task');
  if(!taskNodes.length)throw new Error('No tasks found in XML file.');
  var tasks=[];
  for(var i=0;i<taskNodes.length;i++){
    var node=taskNodes[i];
    var get=function(tag){
      var el=node.getElementsByTagNameNS(ns,tag)[0]||node.getElementsByTagName(tag)[0];
      return el?el.textContent.trim():'';
    };
    var name=get('Name');
    if(!name||name==='Project Summary'||get('UID')==='0')continue;
    var startRaw=get('Start'),finishRaw=get('Finish');
    var pctRaw=get('PercentComplete')||get('PercentWorkComplete')||'0';
    var isSummary=get('Summary')==='1';
    var start=startRaw?startRaw.slice(0,10):'';
    var end=finishRaw?finishRaw.slice(0,10):'';
    var progress=Math.min(100,Math.max(0,parseInt(pctRaw)||0));
    var status=progress===100?'complete':progress>0?'inprog':'upcoming';
    if(start&&end){tasks.push({name:name,start:start,end:end,progress:progress,status:status,isSummary:isSummary});}
  }
  if(!tasks.length)throw new Error('No tasks with valid dates found in XML.');
  MSP.tasks=tasks;
  renderMSPPreview();
}

function parseMSPCSV(content){
  var lines=content.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2)throw new Error('CSV file appears empty.');
  var delim=lines[0].indexOf('\t')>=0?'\t':',';
  var headers=lines[0].split(delim).map(function(h){return h.trim().replace(/^"|"$/g,'').toLowerCase();});
  function findCol(keys){for(var i=0;i<keys.length;i++){var idx=headers.indexOf(keys[i]);if(idx>=0)return idx;}return -1;}
  var ni=findCol(['name','task name','task_name','activity name','activity']);
  var si=findCol(['start','start date','start_date','begin date']);
  var fi=findCol(['finish','end','end date','end_date','finish date','due date']);
  var pi=findCol(['% complete','percent complete','%complete','pct complete','% comp']);
  if(ni<0)throw new Error('Cannot find task name column. Headers: '+headers.slice(0,8).join(', '));
  if(si<0)throw new Error('Cannot find start date column.');
  if(fi<0)throw new Error('Cannot find end/finish date column.');
  var tasks=[];
  for(var i=1;i<lines.length;i++){
    var cols=lines[i].split(delim).map(function(c){return c.trim().replace(/^"|"$/g,'');});
    var name=cols[ni]||'';if(!name)continue;
    var start=parseDateStr(cols[si]||'');
    var end=parseDateStr(fi>=0?cols[fi]||'':'')||start;
    var progress=Math.min(100,Math.max(0,parseInt((pi>=0?cols[pi]||'0':'0').replace(/[^0-9]/g,''))||0));
    var status=progress===100?'complete':progress>0?'inprog':'upcoming';
    if(start)tasks.push({name:name,start:start,end:end,progress:progress,status:status,isSummary:false});
  }
  if(!tasks.length)throw new Error('No valid tasks with dates found in CSV.');
  MSP.tasks=tasks;
  renderMSPPreview();
}

function parseDateStr(s){
  if(!s)return '';
  s=s.trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  var months={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  var m2=s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})/);
  if(m2)return m2[3]+'-'+(months[m2[2].toLowerCase()]||'01')+'-'+m2[1].padStart(2,'0');
  return '';
}

function addDays(dateStr,days){
  // Used by recalcDates for predecessor logic
  // FS+0: next workday after finish
  // FS+lag: next workday after finish + lag working days
  if(days===0)return nextWorkday(dateStr);
  if(days>0){
    // Move forward: first go to next workday, then add (days-1) more
    var next=nextWorkday(dateStr);
    if(days===1)return next;
    return addWorkdays(next, days);
  }
  // Negative lag: go backward
  var dt=new Date(dateStr+'T00:00:00');
  var remaining=Math.abs(days);
  while(remaining>0){dt.setDate(dt.getDate()-1);var ds=dt.toISOString().slice(0,10);if(isWorkday(ds))remaining--;}
  return dt.toISOString().slice(0,10);
}
function recalcSuccessors(p, changedTaskId){
  // Only recalculate tasks that depend on the changed task (directly or indirectly)
  // This preserves manually entered dates on the task being edited
  if(!p||!p.tasks)return;
  var tasks=p.tasks;
  var tmap={};tasks.forEach(function(t){tmap[t.id]=t;});

  // Find all tasks affected (successors of changedTaskId)
  function isSuccessor(taskId, ofId, visited) {
    if(visited[taskId])return false;
    visited[taskId]=true;
    var task=tmap[taskId];if(!task)return false;
    if((task.preds||[]).find(function(pr){return pr.id===ofId;}))return true;
    return (task.preds||[]).some(function(pr){return isSuccessor(taskId,pr.id,visited)||false;});
  }

  // Get tasks that are successors of changedTaskId (have it as predecessor)
  var affected={};
  function markAffected(tid){
    tasks.forEach(function(t){
      if(affected[t.id])return;
      if((t.preds||[]).find(function(pr){return pr.id===tid;})){
        affected[t.id]=true;
        markAffected(t.id); // recurse to get their successors too
      }
    });
  }
  markAffected(changedTaskId);

  // Now run recalc only on affected tasks
  var visited={},sorted=[];
  function visit(t){if(visited[t.id])return;visited[t.id]=true;(t.preds||[]).forEach(function(pr){var pt=tmap[pr.id];if(pt)visit(pt);});sorted.push(t);}
  tasks.forEach(function(t){visit(t);});

  sorted.forEach(function(t){
    if(!affected[t.id])return; // skip non-affected tasks
    if(!t.preds||!t.preds.length)return;
    var cs=null,ce=null;
    t.preds.forEach(function(pr){
      var pt=tmap[pr.id];if(!pt)return;var lag=pr.lag||0,c;
      if(pr.type==='FS'){c=addDays(pt.end,lag+1);if(!cs||c>cs)cs=c;}
      else if(pr.type==='SS'){c=addDays(pt.start,lag);if(!cs||c>cs)cs=c;}
      else if(pr.type==='FF'){c=addDays(pt.end,lag);if(!ce||c>ce)ce=c;}
      else if(pr.type==='SF'){c=addDays(pt.start,lag);if(!ce||c>ce)ce=c;}
    });
    var dur=t.duration||Math.max(1,workdayDiff(t.start,t.end));
    if(cs){t.start=cs;t.end=addWorkdays(t.start,dur-1);}
    else if(ce){t.end=ce;t.start=addWorkdays(t.end,-(dur-1));}
    t.duration=Math.max(1,workdayDiff(t.start,t.end));
  });
}

function recalcDates(p){if(!p||!p.tasks||!p.tasks.length)return;var tasks=p.tasks;var tmap={};tasks.forEach(function(t){tmap[t.id]=t;});var visited={},sorted=[];function visit(t){if(visited[t.id])return;visited[t.id]=true;(t.preds||[]).forEach(function(pr){var pt=tmap[pr.id];if(pt)visit(pt);});sorted.push(t);}tasks.forEach(function(t){visit(t);});sorted.forEach(function(t){if(!t.preds||!t.preds.length)return;var cs=null,ce=null;t.preds.forEach(function(pr){var pt=tmap[pr.id];if(!pt)return;var lag=pr.lag||0,c;if(pr.type==='FS'){c=addDays(pt.end,lag+1);if(!cs||c>cs)cs=c;}else if(pr.type==='SS'){c=addDays(pt.start,lag);if(!cs||c>cs)cs=c;}else if(pr.type==='FF'){c=addDays(pt.end,lag);if(!ce||c>ce)ce=c;}else if(pr.type==='SF'){c=addDays(pt.start,lag);if(!ce||c>ce)ce=c;}});var dur=t.duration||Math.max(1,dif(t.start,t.end));if(cs){t.start=cs;t.end=addDays(t.start,dur-1);}else if(ce){t.end=ce;t.start=addDays(t.end,-(dur-1));}t.duration=Math.max(1,dif(t.start,t.end));});}

// Federal holidays (fixed and floating) for working day calculations

function getHolidays(year) {
  var h = [];
  // Fixed holidays
  h.push(year+'-01-01'); // New Year's Day
  h.push(year+'-06-19'); // Juneteenth
  h.push(year+'-07-04'); // Independence Day
  h.push(year+'-11-11'); // Veterans Day
  h.push(year+'-12-25'); // Christmas Day

  // MLK Day - 3rd Monday of January
  h.push(nthWeekday(year, 1, 1, 3));
  // Presidents Day - 3rd Monday of February
  h.push(nthWeekday(year, 2, 1, 3));
  // Memorial Day - last Monday of May
  h.push(lastWeekday(year, 5, 1));
  // Labor Day - 1st Monday of September
  h.push(nthWeekday(year, 9, 1, 1));
  // Columbus Day - 2nd Monday of October
  h.push(nthWeekday(year, 10, 1, 2));
  // Thanksgiving - 4th Thursday of November
  h.push(nthWeekday(year, 11, 4, 4));

  // If fixed holiday falls on Saturday, observe Friday; Sunday -> Monday
  var adjusted = [];
  h.forEach(function(d) {
    var dt = new Date(d + 'T00:00:00');
    var day = dt.getDay();
    if (day === 6) { // Saturday -> Friday
      dt.setDate(dt.getDate() - 1);
      adjusted.push(dt.toISOString().slice(0, 10));
    } else if (day === 0) { // Sunday -> Monday
      dt.setDate(dt.getDate() + 1);
      adjusted.push(dt.toISOString().slice(0, 10));
    } else {
      adjusted.push(d);
    }
  });
  return adjusted;
}
function recalcViolations(p){
  // Smart recalc: only fixes tasks whose start date violates predecessor logic
  // Will NOT move a task earlier or touch tasks with no predecessors
  if(!p||!p.tasks||!p.tasks.length)return false;
  var tasks=p.tasks;var tmap={};tasks.forEach(function(t){tmap[t.id]=t;});
  var visited={},sorted=[];
  function visit(t){if(visited[t.id])return;visited[t.id]=true;(t.preds||[]).forEach(function(pr){var pt=tmap[pr.id];if(pt)visit(pt);});sorted.push(t);}
  tasks.forEach(function(t){visit(t);});
  var changed=false;
  sorted.forEach(function(t){
    if(!t.preds||!t.preds.length)return;
    var cs=null,ce=null;
    t.preds.forEach(function(pr){
      var pt=tmap[pr.id];if(!pt)return;var lag=pr.lag||0,c;
      if(pr.type==='FS'){c=addDays(pt.end,lag+1);if(!cs||c>cs)cs=c;}
      else if(pr.type==='SS'){c=addDays(pt.start,lag);if(!cs||c>cs)cs=c;}
      else if(pr.type==='FF'){c=addDays(pt.end,lag);if(!ce||c>ce)ce=c;}
      else if(pr.type==='SF'){c=addDays(pt.start,lag);if(!ce||c>ce)ce=c;}
    });
    var dur=t.duration||Math.max(1,workdayDiff(t.start,t.end));
    if(cs&&t.start<cs){
      t.start=cs;t.end=addWorkdays(t.start,dur-1);
      t.duration=Math.max(1,workdayDiff(t.start,t.end));
      changed=true;
    } else if(ce&&(!t.end||t.end<ce)){
      t.end=ce;t.start=addWorkdays(t.end,-(dur-1));
      t.duration=Math.max(1,workdayDiff(t.start,t.end));
      changed=true;
    }
  });
  return changed;
}


function nthWeekday(year, month, dow, nth) {
  // dow: 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  var d = new Date(year, month - 1, 1);
  var count = 0;
  while (true) {
    if (d.getDay() === dow) { count++; if (count === nth) break; }
    d.setDate(d.getDate() + 1);
  }
  return d.toISOString().slice(0, 10);
}

function lastWeekday(year, month, dow) {
  var d = new Date(year, month, 0); // last day of month
  while (d.getDay() !== dow) d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

// Cache holidays per year
var _holidayCache = {};
function isHoliday(dateStr) {
  var year = parseInt(dateStr.slice(0, 4));
  if (!_holidayCache[year]) _holidayCache[year] = getHolidays(year);
  return _holidayCache[year].indexOf(dateStr) >= 0;
}

function isWorkday(dateStr) {
  var dt = new Date(dateStr + 'T00:00:00');
  var day = dt.getDay();
  if (day === 0 || day === 6) return false; // weekend
  if (isHoliday(dateStr)) return false;
  return true;
}

// Count working days between two dates (inclusive of start, exclusive of end)
function workdayDiff(startStr, endStr) {
  // Inclusive of both start and end dates
  // Mon->Fri = 5 working days
  if (!startStr || !endStr) return 0;
  var start = new Date(startStr + 'T00:00:00');
  var end = new Date(endStr + 'T00:00:00');
  if (end < start) return 0;
  var count = 0;
  var cur = new Date(start);
  while (cur <= end) {
    var ds = cur.toISOString().slice(0, 10);
    if (isWorkday(ds)) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return Math.max(1, count);
}

// Add working days to a date, returns new date string
function addWorkdays(dateStr, days) {
  // Returns the end date when starting on dateStr for 'days' working days (inclusive)
  // addWorkdays('2026-01-05', 5) = '2026-01-09' (Mon->Fri = 5 days)
  if (!dateStr || days === 0) return dateStr;
  if (days > 0) {
    // Count forward: start date counts as day 1
    var dt = new Date(dateStr + 'T00:00:00');
    var ds = dt.toISOString().slice(0, 10);
    // If start is not a workday, move to next workday first
    if (!isWorkday(ds)) return addWorkdays(nextWorkday(ds), days);
    var remaining = days - 1; // start date is day 1
    while (remaining > 0) {
      dt.setDate(dt.getDate() + 1);
      ds = dt.toISOString().slice(0, 10);
      if (isWorkday(ds)) remaining--;
    }
    return dt.toISOString().slice(0, 10);
  } else {
    // Count backward
    var dt2 = new Date(dateStr + 'T00:00:00');
    var ds2 = dt2.toISOString().slice(0, 10);
    var remaining2 = Math.abs(days) - 1;
    if (!isWorkday(ds2)) {
      dt2.setDate(dt2.getDate() - 1);
      ds2 = dt2.toISOString().slice(0, 10);
      while (!isWorkday(ds2)) { dt2.setDate(dt2.getDate()-1); ds2=dt2.toISOString().slice(0,10); }
    }
    while (remaining2 > 0) {
      dt2.setDate(dt2.getDate() - 1);
      ds2 = dt2.toISOString().slice(0, 10);
      if (isWorkday(ds2)) remaining2--;
    }
    return dt2.toISOString().slice(0, 10);
  }
}

// Next workday on or after a date
function nextWorkday(dateStr) {
  var dt = new Date(dateStr + 'T00:00:00');
  var ds = dt.toISOString().slice(0, 10);
  while (!isWorkday(ds)) {
    dt.setDate(dt.getDate() + 1);
    ds = dt.toISOString().slice(0, 10);
  }
  return ds;
}

function parsePreds(predStr,tasks,selfId){
  if(!predStr||!predStr.trim())return[];
  var result=[];
  predStr.split(',').forEach(function(part){
    part=part.trim();
    if(!part)return;
    var m=part.match(/^([\d.]+)(FS|SS|FF|SF)?([+-]\d+)?$/i);
    if(!m)return;
    var wbs=m[1],type=(m[2]||'FS').toUpperCase(),lag=m[3]?parseInt(m[3]):0;
    var pt=tasks.find(function(t){return t.wbs===wbs&&t.id!==selfId;});
    if(pt)result.push({id:pt.id,type:type,lag:lag});
  });
  return result;
}

function saveTask(pid,tid){
  var p=S.projects.find(function(x){return x.id===pid;});
  if(!p)return;if(!p.tasks)p.tasks=[];
  var isNew=!tid;
  var t=tid?p.tasks.find(function(x){return x.id===tid;}):{id:uid()};
  if(!t)return;

  // Read exactly what the user typed - no recalculation here
  var wbs=document.getElementById('mf_wbs');
  var nm=document.getElementById('mf1');
  var st=document.getElementById('mf2');
  var en=document.getElementById('mf3');
  var du=document.getElementById('mf_dur');
  var ss=document.getElementById('mf4');
  var pr=document.getElementById('mf5');

  t.wbs=(wbs?wbs.value.trim():'')||String(p.tasks.length+1);
  t.name=(nm?nm.value.trim():'')||'Task';
  t.start=st?st.value:'';
  t.end=en?en.value:'';
  // Duration: use what's in the field, fall back to calculating from dates
  var durVal=du?parseInt(du.value.trim()):0;
  t.duration=durVal||Math.max(1,workdayDiff(t.start,t.end));
  // If we have start+duration but end is blank, calculate end
  if(t.start&&t.duration&&!t.end){
    t.end=addWorkdays(t.start,t.duration);
  }
  // If we have end+duration but start is blank, calculate start
  if(t.end&&t.duration&&!t.start){
    t.start=addWorkdays(t.end,-t.duration);
  }
  t.preds=getPreds();
  t.status=ss?ss.value:'upcoming';
  t.progress=Math.min(100,Math.max(0,pr?parseInt(pr.value)||0:0));

  if(isNew)p.tasks.push(t);
  // Push only successor tasks forward - never touch the task we just saved
  recalcSuccessors(p,t.id);
  save();closeM();render();
}

function buildContext(){
  var p = CP();

    var pc = pct(pr), pd = paidT(pr), pb = billedT(pr), pc2 = contractT(pr);

    }
    if(pr.milestones && pr.milestones.length){
      ctx += 'Action Items/Checklist (' + pr.milestones.length + '):\n';
      pr.milestones.forEach(function(m){
        var overdue = !m.done && m.due && m.due < today();
        ctx += '  - [' + (m.done ? 'DONE' : overdue ? 'OVERDUE' : 'PENDING') + '] ' + m.name + (m.due ? ' (due ' + m.due + ')' : '') + (m.note ? ' | Note: ' + m.note : '') + '\n';
      });
    }
    if(pr.sov && pr.sov.length){
      ctx += 'Schedule of Values:\n';
      pr.sov.forEach(function(s){
        var out = (s.billed||0)-(s.paid||0);
        var overdue = s.due && s.due < today() && out > 0;
        ctx += '  - ' + s.desc + ': SV=$' + Math.round(s.sv||0).toLocaleString() + ', Billed=$' + Math.round(s.billed||0).toLocaleString() + ', Paid=$' + Math.round(s.paid||0).toLocaleString() + (overdue?' [OVERDUE]':'') + '\n';

}

async function sendChat(){
  var ta = document.getElementById('chatInput');
  var msg = ta ? ta.value.trim() : '';
  if(!msg) return;

  var key = S.apiKey;

    appendBubble('ai', 'Please enter your Anthropic API key in the field above to use this feature.');
    return;
  }

  ta.value = '';
  ta.style.height = '40px';
  appendBubble('user', msg);
  var thinkId = appendBubble('thinking', 'Thinking...');

  chatHistory.push({role:'user', content: msg});

  var systemPrompt = buildContext();

  try{
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model: 'claude-opus-4-5',

    var data = await resp.json();
    if(data.error) throw new Error(data.error.message || 'API error');
    var reply = ((data.content||[]).find(function(c){return c.type==='text';})||{}).text || 'No response.';
    chatHistory.push({role:'assistant', content: reply});
    removeBubble(thinkId);
    appendBubble('ai', reply);
  }catch(err){
    removeBubble(thinkId);
    appendBubble('ai', 'Error: ' + err.message);
  }
}

function appendBubble(type, text){
  var msgs = document.getElementById('chatMsgs');
  if(!msgs) return null;
  var id = 'bubble-' + uid();
  var div = document.createElement('div');
  div.id = id;
  div.className = 'chat-bubble ' + type;
  div.innerHTML = type === 'ai' ? formatAIText(text) : escEl(text);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeBubble(id){
  if(!id) return;
  var el = document.getElementById(id);
  if(el) el.remove();
}

function formatAIText(text){
  return escEl(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^(#{1,3})\s+(.+)$/gm, '<strong>$2</strong>')
    .replace(/^[-*]\s+(.+)$/gm, '&bull; $1')
    .replace(/\n/g, '<br>');
}

function escEl(s){
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function sendChip(text){
  var ta = document.getElementById('chatInput');
  if(ta){ ta.value = text; sendChat(); }
}

function escAttr(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── GOOGLE TASKS INTEGRATION ──────────────────────────────────

var TASKS_BASE = 'https://tasks.googleapis.com/tasks/v1';

async function gtGet(path){
  var tok=await getValidToken();
  var r=await fetch(TASKS_BASE+path,{headers:{Authorization:'Bearer '+tok}});
  if(!r.ok)throw new Error('Tasks API error '+r.status);
  return r.json();
}

async function gtPost(path,body){
  var tok=await getValidToken();
  var r=await fetch(TASKS_BASE+path,{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error('Tasks API error '+r.status);
  return r.json();
}

async function gtPatch(path,body){
  var tok=await getValidToken();
  var r=await fetch(TASKS_BASE+path,{method:'PATCH',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error('Tasks API error '+r.status);
  return r.json();
}

async function getOrCreateTaskList(projectName){
  // Find existing list matching project name
  var lists=await gtGet('/users/@me/lists');
  var items=lists.items||[];
  var existing=items.find(function(l){return l.title===projectName;});
  if(existing)return existing.id;
  // Create new list
  var created=await gtPost('/users/@me/lists',{title:projectName});
  return created.id;
}

async function syncProjectTasks(p){
  if(!GS.token)return;
  var myEmail=GS.user?GS.user.email.toLowerCase():'';
  try{
    var listId=await getOrCreateTaskList(p.name);
    if(!p._gtListId)p._gtListId=listId;

    // Deduplicate existing milestones by name (keep the one with gtaskId if both exist)
    var seen={};
    var deduped=[];
    p.milestones.forEach(function(m){
      var key=m.name.trim().toLowerCase();
      if(seen[key]){
        // Keep the one with gtaskId, discard the other
        if(m.gtaskId&&!seen[key].gtaskId){
          deduped=deduped.filter(function(x){return x!==seen[key];});
          seen[key]=m;deduped.push(m);
        }
        // else discard this duplicate
      } else {
        seen[key]=m;deduped.push(m);
      }
    });
    if(deduped.length!==p.milestones.length){
      p.milestones=deduped;changed=true;
    }

    // Get all tasks from Google Tasks list
    var gtTasks=[];
    var pageToken=null;
    do{
      var url='/lists/'+listId+'/tasks?showCompleted=true&showHidden=true'+(pageToken?'&pageToken='+pageToken:'');
      var resp=await gtGet(url);
      gtTasks=gtTasks.concat(resp.items||[]);
      pageToken=resp.nextPageToken||null;
    }while(pageToken);

    var changed=false;
    var myEmail2=myEmail;

    // Pull new tasks from Google Tasks into ConstructTrack
    gtTasks.forEach(function(gt){
      if(!gt.title||gt.title.trim()==='')return;
      // Check if already imported - match by gtaskId OR by name (for existing tasks)
      var existing=p.milestones.find(function(m){
        return m.gtaskId===gt.id || m.name.trim().toLowerCase()===gt.title.trim().toLowerCase();
      });
      if(existing&&!existing.gtaskId){
        // Link existing task to its Google Tasks counterpart
        existing.gtaskId=gt.id;
        changed=true;
      }
      if(!existing){
        // New task from Google Tasks - import as Personal
        var dueDate='';
        if(gt.due){
          // Google Tasks due format: 2026-06-15T00:00:00.000Z
          dueDate=gt.due.slice(0,10);
        }
        p.milestones.push({
          id:uid(),
          name:gt.title,
          due:dueDate,
          done:gt.status==='completed',
          note:gt.notes||'',
          visibility:'personal', // Google Tasks imports = personal by default
          gtaskId:gt.id,
          createdBy:myEmail2
        });
        changed=true;
      } else {
        // Update existing - sync completion status from Google Tasks
        if(gt.status==='completed'&&!existing.done){
          existing.done=true;changed=true;
        }
      }
    });

    // Push ConstructTrack completions back to Google Tasks
    var savePromises=[];
    p.milestones.forEach(function(m){
      if(!m.gtaskId)return;
      var gt=gtTasks.find(function(g){return g.id===m.gtaskId;});
      if(!gt)return;
      // If done in CT but not in GT, mark done in GT
      if(m.done&&gt.status!=='completed'){
        savePromises.push(gtPatch('/lists/'+listId+'/tasks/'+m.gtaskId,{status:'completed'}));
        changed=true;
      }
      // If task name changed in CT, update GT
      if(gt.title!==m.name){
        savePromises.push(gtPatch('/lists/'+listId+'/tasks/'+m.gtaskId,{title:m.name,notes:m.note||'',due:m.due?m.due+'T00:00:00.000Z':undefined}));
      }
    });

    // Push new shared tasks (not yet in Google Tasks) to Google Tasks
    var pushPromises=[];
    p.milestones.forEach(function(m){
      if(m.gtaskId)return; // already synced
      if(m.visibility==='personal'&&(!m.createdBy||m.createdBy.toLowerCase()!==myEmail2))return;
      // Create in Google Tasks
      pushPromises.push(
        gtPost('/lists/'+listId+'/tasks',{
          title:m.name,
          notes:m.note||'',
          status:m.done?'completed':'needsAction',
          due:m.due?m.due+'T00:00:00.000Z':undefined
        }).then(function(created){m.gtaskId=created.id;changed=true;})
        .catch(function(){})
      );
    });

    await Promise.all(savePromises.concat(pushPromises));
    if(changed){save();render();}

  }catch(err){
    console.warn('Google Tasks sync error for '+p.name+':', err.message);
  }
}

async function cleanupDuplicateTasks(pid){
  var p=S.projects.find(function(x){return x.id===pid;});
  if(!p)return;
  var btn=document.getElementById('cleanupBtn');
  if(btn){btn.textContent='Cleaning...';btn.disabled=true;}

  try{
    // Step 1: Get Google Tasks list
    var listId=await getOrCreateTaskList(p.name);
    var gtTasks=[];
    var pageToken=null;
    do{
      var url='/lists/'+listId+'/tasks?showCompleted=true&showHidden=true'+(pageToken?'&pageToken='+pageToken:'');
      var resp=await gtGet(url);
      gtTasks=gtTasks.concat(resp.items||[]);
      pageToken=resp.nextPageToken||null;
    }while(pageToken);

    // Step 2: Deduplicate Google Tasks by title - delete extras
    var gtSeen={};
    var deletePromises=[];
    gtTasks.forEach(function(gt){
      if(!gt.title)return;
      var key=gt.title.trim().toLowerCase();
      if(gtSeen[key]){
        // Duplicate - delete this one from Google Tasks
        var tok=GS.token;
        deletePromises.push(
          fetch(TASKS_BASE+'/lists/'+listId+'/tasks/'+gt.id,
            {method:'DELETE',headers:{Authorization:'Bearer '+tok}})
          .catch(function(){})
        );
      } else {
        gtSeen[key]=gt;
      }
    });
    await Promise.all(deletePromises);
    console.log('Deleted '+deletePromises.length+' duplicate Google Tasks');

    // Step 3: Deduplicate ConstructTrack milestones by name
    var ctSeen={};
    var deduped=[];
    p.milestones.forEach(function(m){
      var key=m.name.trim().toLowerCase();
      if(ctSeen[key]){
        // Keep the one with gtaskId
        if(m.gtaskId&&!ctSeen[key].gtaskId){
          deduped=deduped.filter(function(x){return x.id!==ctSeen[key].id;});
          ctSeen[key]=m;deduped.push(m);
        }
        // else discard this one
      } else {
        ctSeen[key]=m;deduped.push(m);
      }
    });

    // Step 4: Link CT tasks to GT tasks by name
    deduped.forEach(function(m){
      if(m.gtaskId)return;
      var key=m.name.trim().toLowerCase();
      if(gtSeen[key])m.gtaskId=gtSeen[key].id;
    });

    var removed=p.milestones.length-deduped.length;
    p.milestones=deduped;

    // Step 5: Save clean state to Sheets
    await save();
    render();

    if(btn){btn.textContent='↺ Sync Google Tasks';btn.disabled=false;}
    alert('Cleanup complete. Removed '+removed+' duplicate task(s) from ConstructTrack and '+deletePromises.length+' from Google Tasks.');

  }catch(err){
    console.error('Cleanup error:',err);
    if(btn){btn.textContent='↺ Sync Google Tasks';btn.disabled=false;}
    alert('Cleanup error: '+err.message);
  }
}
